name = "amazon-stock-helper-v2"
pages_build_output_dir = "public"
compatibility_date = "2026-06-01"

# D1 数据库绑定（请替换为新的 D1 database_id）
[[d1_databases]]
binding = "DB"
database_name = "amazon_inventory_db_v2"
database_id = "REPLACE_WITH_NEW_D1_DATABASE_ID"

# 环境变量
[vars]
APP_VERSION = "1.0.1"

# 密钥（部署后通过 wrangler secret 设置）
# [[secrets]]
# ADMIN_PASSWORD_HASH = "..."
